<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mediglow — Demo</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%230b6'/%3E%3Cpath d='M7 13c1.5-2 4-3 6-3s4.5 1 6 3v3H7v-3z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="src/styles.css">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
  <!-- Barcode Detection Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.2/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect width="24" height="24" rx="6" fill="#0b6"/><path d="M7 13c1.5-2 4-3 6-3s4.5 1 6 3v3H7v-3z" fill="white" opacity="0.95"/></svg>
        <div>
          <h1 class="app-title">mediglow</h1>
          <div class="tagline">transforming transparency into trust</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="themeToggle" title="Toggle theme" aria-label="Toggle theme" class="icon-btn" onclick="themeToggle()">
          <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 3v2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 19v2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.22 4.22l1.42 1.42" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.36 18.36l1.42 1.42" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 12h2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12h2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.22 19.78l1.42-1.42" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.36 5.64l1.42-1.42" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="app">
    <div class="container">
      <div class="app-grid">
        <aside class="sidebar">
          <section class="panel sidebar-panel" aria-labelledby="controlsHeading">
            <h2 id="controlsHeading">Controls</h2>
            <div class="control-group">
              <label class="small">OCR Image</label>
              <input type="file" id="ocrImage" accept="image/*">
              <div class="actions" style="margin-top:8px">
                <button id="ocrImageBtn" class="btn-icon" type="button" onclick="ocrImageBtn()"> 
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="#042" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 10l5-5 5 5" stroke="#042" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  <span style="margin-left:8px">OCR Image</span>
                </button>
                <button id="ocrCameraBtn" class="secondary btn-icon" type="button" onclick="ocrCameraBtn()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="7" width="18" height="13" rx="2" stroke="#0f1724" stroke-width="1.4"/><path d="M16 3l-1.5 3h-5L8 3" stroke="#0f1724" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  <span style="margin-left:8px">OCR Camera</span>
                </button>
              </div>
            </div>

            <div class="control-group">
              <label class="small">Camera</label>
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <button id="requestCameraBtn" class="secondary" type="button" onclick="requestCameraBtn()">Request Camera</button>
                <button id="stopCameraBtn" class="secondary" type="button" onclick="stopCameraBtn()" style="background:#f59e0b;color:white;">Stop Camera</button>
                <span id="permissionStatus" class="small">Camera: unknown</span>
              </div>
              <video id="ocrVideo" autoplay playsinline class="preview-video" hidden></video>
            </div>

            <div class="control-group">
              <label class="small">Barcode</label>
              <input type="file" id="barcodeImage" accept="image/*">
              <div class="actions" style="margin-top:8px">
                <button id="barcodeImageBtn" class="btn-icon" type="button" onclick="barcodeImageBtn()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="5" width="20" height="14" rx="2" stroke="#042" stroke-width="1.4"/><path d="M7 9v6" stroke="#042" stroke-width="1.4" stroke-linecap="round"/><path d="M10 9v6" stroke="#042" stroke-width="1.4" stroke-linecap="round"/><path d="M14 9v6" stroke="#042" stroke-width="1.4" stroke-linecap="round"/><path d="M17 9v6" stroke="#042" stroke-width="1.4" stroke-linecap="round"/></svg>
                  <span style="margin-left:8px">Scan Image</span>
                </button>
                <button id="startBarcodeCamBtn" class="secondary btn-icon" type="button" onclick="startBarcodeCamBtn()">Start Scan</button>
                <button id="stopBarcodeCamBtn" disabled class="secondary btn-icon" type="button" onclick="stopBarcodeCamBtn()">Stop</button>
              </div>
              <div id="barcodeResult" class="small" style="margin-top:8px;color:var(--muted)"></div>
              <video id="barcodeVideo" autoplay playsinline class="preview-video" hidden></video>
            </div>

            <div class="control-group two-cols">
              <div>
                <label class="small">Product Type</label>
                <select id="productType">
                  <option>Cosmetic</option>
                  <option>Medicine</option>
                </select>
              </div>
              <div>
                <label class="small">Skin Type</label>
                <select id="skinType">
                  <option>Normal</option>
                  <option>Oily</option>
                  <option>Dry</option>
                  <option>Acne-prone</option>
                  <option>Sensitive</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label class="small">Product Name</label>
              <input id="productName" placeholder="e.g., Gentle Face Cream" />
            </div>

            <div class="control-group">
              <label class="small">Ingredient List</label>
              <textarea id="ingredientText" placeholder="e.g., Water, Glycerin, Parfum (Fragrance), Retinol 0.3%"></textarea>
            </div>

            <div class="control-group two-cols">
              <div>
                <label class="small">Known allergies</label>
                <input id="allergies" placeholder="e.g., fragrance" />
              </div>
              <div>
                <label class="small">Age</label>
                <input id="age" type="number" min="0" max="120" />
              </div>
            </div>

            <div class="control-group two-cols">
              <div>
                <label class="small">Pregnancy</label>
                <select id="pregnancy"><option>No</option><option>Yes</option></select>
              </div>
              <div>
                <label class="small">Risk Sensitivity</label>
                <select id="sensitivity"><option>Balanced</option><option>Conservative</option><option>Minimalist</option></select>
              </div>
            </div>

            <div class="actions" style="margin-top:12px">
              <button id="analyzeBtn" title="Run safety analysis" aria-label="Run analysis" class="btn-icon" type="button" onclick="analyzeBtn()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M3 12h3" stroke="#042" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12h-3" stroke="#042" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 3v3" stroke="#042" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 21v-3" stroke="#042" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="#042" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span style="margin-left:8px">Analyze</span>
              </button>
              <button id="downloadBtn" class="secondary btn-icon" title="Download structured JSON" aria-label="Download JSON" type="button" onclick="downloadBtn()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 3v12" stroke="#0f1724" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 11l4 4 4-4" stroke="#0f1724" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="17" width="18" height="4" rx="1" stroke="#0f1724" stroke-width="1.2"/></svg>
                <span style="margin-left:8px">Download</span>
              </button>
              <button id="clearBtn" class="secondary btn-icon" title="Clear form" aria-label="Clear form" type="button" onclick="clearBtn()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M18 6L6 18" stroke="#0f1724" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 6l12 12" stroke="#0f1724" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span style="margin-left:8px">Clear</span>
              </button>
            </div>
          </section>
        </aside>

        <section class="content">
          <section class="panel results-panel">
            <h2>Analysis Output</h2>
            <div class="result-grid">
              <div class="result-pane">
                <h3>Structured JSON</h3>
                <pre id="jsonOut">{/* results will appear here */}</pre>
              </div>
              <div class="human-pane">
                <h3>Summary</h3>
                <div id="humanSummary">Run analysis to see a concise summary here.</div>
              </div>
            </div>
          </section>
        </section>
      </div>
    </div>
  </main>

  <div id="toast" role="status" aria-live="polite" class="toast" hidden></div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
